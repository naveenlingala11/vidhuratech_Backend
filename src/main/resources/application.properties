spring.application.name=jobs

# DEFAULT PROFILE
spring.profiles.active=dev

# COMMON SETTINGS
spring.jpa.open-in-view=false

# PAGINATION
spring.data.web.pageable.default-page-size=15
spring.data.web.pageable.max-page-size=50

# THREADS
spring.task.execution.pool.core-size=6
spring.task.execution.pool.max-size=12

# CRON

scraper.cron.daily=0 0 8 * * *
scraper.cron.periodic=0 0 */6 * * *

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# PAYMENT
payment.upi-id=vidhuratech@axl
payment.merchant-name=Vidhura Tech


spring.application.name=jobs

# PROFILE
spring.profiles.active=dev

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# PAGINATION
spring.data.web.pageable.default-page-size=15
spring.data.web.pageable.max-page-size=50

# THREADS
spring.task.execution.pool.core-size=6
spring.task.execution.pool.max-size=12

# CRON
scraper.cron.daily=0 0 8 * * *
scraper.cron.periodic=0 0 */6 * * *

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# FILE UPLOAD
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# MAIL (ENV BASED)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# PAYMENT
payment.upi-id=${PAYMENT_UPI_ID}
payment.merchant-name=Vidhura Tech

# REDIS
spring.data.redis.url=${REDIS_URL}

# FRONTEND
app.frontend-url=${FRONTEND_URL}
spring.application.name=jobs

# ?? Database ??????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/jobsdb
spring.datasource.username=postgres
spring.datasource.password=naveen
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8080

# ?? Pagination defaults ???????????????????????????????????????????????????????
spring.data.web.pageable.default-page-size=15
spring.data.web.pageable.max-page-size=50

# ?? Scraper schedules ?????????????????????????????????????????????????????????
# Daily at 8:00 AM
scraper.cron.daily=0 0 8 * * *
# Every 6 hours
scraper.cron.periodic=0 0 */6 * * *

# ?? Thread pool ???????????????????????????????????????????????????????????????
spring.task.execution.pool.core-size=6
spring.task.execution.pool.max-size=12
spring.task.execution.pool.queue-capacity=500

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.vidhuratech=DEBUG
logging.level.org.openqa.selenium=ERROR
logging.level.org.openqa.selenium.devtools=ERROR
logging.level.org.openqa.selenium.chromium=ERROR
logging.level.io.github.bonigarcia=WARN
logging.level.org.hibernate.SQL=WARN

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
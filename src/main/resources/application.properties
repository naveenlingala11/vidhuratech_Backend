spring.application.name=jobs

# ACTIVE PROFILE (default dev)
spring.profiles.active=dev

# JPA COMMON
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# PAGINATION
spring.data.web.pageable.default-page-size=15
spring.data.web.pageable.max-page-size=50

# THREADS
spring.task.execution.pool.core-size=6
spring.task.execution.pool.max-size=12

# CRON
scraper.cron.daily=0 0 8 * * *
scraper.cron.periodic=0 0 */6 * * *

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true